<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="Portail Collaborateur Joker Team" />
    <link rel="icon" type="image/png" href="/logo-joker-team.png" />
    <title>Joker Team — Espace Collaborateur</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; }
      #splash { position: fixed; inset: 0; z-index: 9999; background: #0f172a; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.4s ease; }
      #splash img { height: 70px; margin-bottom: 1.5rem; }
      #splash .loader { width: 36px; height: 36px; border: 3px solid rgba(212,175,55,0.2); border-top-color: #D4AF37; border-radius: 50%; animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg) } }
      #splash.hidden { opacity: 0; pointer-events: none; }
    </style>
  </head>
  <body>
    <div id="splash">
      <img src="/logo-joker-team.png" alt="Joker Team" onerror="this.style.display='none'" />
      <div class="loader"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash')
          if (splash) { splash.classList.add('hidden'); setTimeout(() => splash.remove(), 500) }
        }, 600)
      })
    </script>
  </body>
</html>
